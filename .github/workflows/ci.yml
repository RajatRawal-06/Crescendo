name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install package
        run: python -m pip install -e .
      - name: Unit tests
        run: python -m unittest discover -s tests -v
      - name: Benchmark smoke test
        run: python -m crescendo_guard.cli run-benchmark --results-dir /tmp/crescendo-results --reports-dir /tmp/crescendo-reports
